<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contractor Registration | BuildRent</title>
    <style>
        :root {
            --primary: #f39c12;
            --dark: #2c3e50;
            --white: #ffffff;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(rgba(44, 62, 80, 0.9), rgba(44, 62, 80, 0.9)), 
                        url('https://images.unsplash.com/photo-1504307651254-35680f356dfd?auto=format&fit=crop&w=1350&q=80');
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .signup-container {
            background: var(--white);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            width: 100%;
            max-width: 450px;
        }

        .signup-container h2 {
            color: var(--dark);
            margin-bottom: 10px;
            text-align: center;
        }

        .signup-container p {
            text-align: center;
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 25px;
        }

        .form-group { margin-bottom: 15px; }

        label {
            display: block;
            font-size: 0.85rem;
            font-weight: bold;
            margin-bottom: 5px;
            color: var(--dark);
        }

        input, select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 1rem;
        }

        .btn-register {
            background: var(--primary);
            color: var(--dark);
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn-register:hover {
            background: #e67e22;
        }

        .footer-link {
            text-align: center;
            margin-top: 20px;
            font-size: 0.85rem;
        }

        .footer-link a { color: var(--primary); text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

    <div class="signup-container">
        <h2>Join BuildRent</h2>
        <p>Register as a Certified Contractor to start renting.</p>
        
        <form id="registrationForm">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" placeholder="e.g. Veer Jora" required>
            </div>

            <div class="form-group">
                <label>Company Name / PRN</label>
                <input type="text" placeholder="Enter Company Name or Student PRN" required>
            </div>

            <div class="form-group">
                <label>Equipment Interest</label>
                <select>
                    <option>Earthmoving (Excavators/JCB)</option>
                    <option>Concrete Equipment</option>
                    <option>Material Handling (Cranes)</option>
                    <option>Road Construction</option>
                </select>
            </div>

            <div class="form-group">
                <label>Email Address</label>
                <input type="email" placeholder="name@company.com" required>
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" placeholder="Create a strong password" required>
            </div>

            <button type="submit" class="btn-register">Create Account</button>
        </form>

        <div class="footer-link">
            Already have an account? <a href="login.html">Login here</a>
        </div>
    </div>

    <script>
        document.getElementById('registrationForm').onsubmit = function(e) {
            e.preventDefault();
            alert("Registration Submitted! Our team will verify your documents within 24 hours.");
            window.location.href = "index.html"; // Redirect back to home
        };
    </script>


<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

<script>
  // 1. YOUR FIREBASE CONFIG (Paste your actual keys here)
  const firebaseConfig = {
    apiKey: "AIzaSyDBhSOA4QW3LmVoMHYPrqSeu2WAKrnQE0s",
    authDomain: "buildrent.firebaseapp.com",
    projectId: "buildrent",
    storageBucket: "buildrent.appspot.com",
    messagingSenderId: "123456789",
    appId: "1:123456789:web:abcdef"
  };

  // 2. Initialize Firebase
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.firestore();

  // 3. Handle Registration
  document.getElementById('registrationForm').onsubmit = async function(e) {
      e.preventDefault();

      const name = document.querySelector('input[placeholder="e.g. Veer Jora"]').value;
      const prn = document.querySelector('input[placeholder*="PRN"]').value;
      const email = document.querySelector('input[type="email"]').value;
      const password = document.querySelector('input[type="password"]').value;

      try {
          // Create User in Auth
          const userCredential = await auth.createUserWithEmailAndPassword(email, password);
          const user = userCredential.user;

          // Store Contractor Details in Database
          await db.collection("contractors").doc(user.uid).set({
              fullName: name,
              prnNumber: prn,
              email: email,
              createdAt: new Date()
          });

          alert("Account Created! You are now a registered BuildRent Contractor.");
          window.location.href = "index.html"; 
      } catch (error) {
          alert("Error: " + error.message);
      }
  };
</script>

          try {
              // Simulating successful database insertion & local logging
              console.log("Mock DB Save:", { fullName: name, prnNumber: prn, email: email, status: "Verified" });

              // Showing professional confirmation alert
              alert(`Account Created Successfully!\nWelcome, ${name}. Your Contractor Profile (PRN: ${prn}) has been verified.`);
              
              // Smooth redirect back to your live fleet page
              window.location.href = "index.html"; 
          } catch (error) {
              alert("Error: " + error.message);
          }
      };
    </script>

</body>
</html>
